ai:
  confidence_threshold: 0.8
  enable_learning: true
  enable_ml_analysis: true
  model_path: models/
  prediction_cache_size: 1000
  training_data_path: data/training/
cleaning:
  application_caches: true
  browser_caches: true
  confirm_deletion: true
  download_history: false
  dry_run: false
  min_file_age_hours: 24
  system_caches: true
  system_logs: true
  temp_files: true
  user_caches: true
general:
  auto_backup: true
  data_retention_days: 30
  enable_ai: true
  log_level: INFO
  max_backup_size: 1GB
  safe_mode: true
optimization:
  background_processes: true
  disk_optimization: true
  launch_agents_optimization: true
  memory_optimization: true
  power_optimization: true
  registry_optimization: true
  startup_optimization: true
scanning:
  exclude_patterns:
  - '*.important'
  - backup/*
  - '*.backup'
  - '*.bak'
  include_application_caches: true
  include_browser_caches: true
  include_logs: true
  include_system_caches: true
  include_temp_files: true
  include_user_caches: true
  max_scan_depth: 10
  quick_mode: false
  scan_timeout: 300
security:
  backup_critical_files: true
  blacklist_paths:
  - /System/Library/
  - /Library/
  - /bin/
  - /sbin/
  - /usr/bin/
  - /usr/sbin/
  require_confirmation: true
  validate_file_signatures: true
  whitelist_paths:
  - /System/
  - /Applications/
  - /Users/*/Documents/
  - /Users/*/Desktop/
